version: '3.8'

services:
  backend:
    build:
      context: ./realworld-springboot-java
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - realworld-net

  frontend:
    build:
      context: ./realworld-app-angular-v20
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - realworld-net

networks:
  realworld-net:
    driver: bridge
